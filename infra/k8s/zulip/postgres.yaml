apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: zulip
data:
  # This script runs on first start and creates the MLflow database + user.
  # The 'zulip' database is created automatically via the POSTGRES_DB env var.
  create_mlflow_db.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE mlflow;
      CREATE USER mlflow_user WITH ENCRYPTED PASSWORD '${MLFLOW_POSTGRES_PASSWORD}';
      GRANT ALL PRIVILEGES ON DATABASE mlflow TO mlflow_user;
      \c mlflow
      GRANT ALL ON SCHEMA public TO mlflow_user;
    EOSQL

  create_chatsentry_db.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE chatsentry;
      CREATE USER chatsentry_user WITH ENCRYPTED PASSWORD '${CHATSENTRY_POSTGRES_PASSWORD}';
      GRANT ALL PRIVILEGES ON DATABASE chatsentry TO chatsentry_user;
      \c chatsentry
      GRANT ALL ON SCHEMA public TO chatsentry_user;
      CREATE EXTENSION IF NOT EXISTS "pgcrypto";
      CREATE TABLE IF NOT EXISTS users (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          username VARCHAR(255) NOT NULL UNIQUE,
          email VARCHAR(255),
          created_at TIMESTAMPTZ DEFAULT NOW(),
          source VARCHAR(32) NOT NULL DEFAULT 'real'
              CHECK (source IN ('real', 'synthetic'))
      );
      CREATE TABLE IF NOT EXISTS messages (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          user_id UUID NOT NULL REFERENCES users(id),
          text TEXT NOT NULL,
          cleaned_text TEXT,
          is_toxicity BOOLEAN DEFAULT FALSE,
          is_suicide BOOLEAN DEFAULT FALSE,
          source VARCHAR(32) NOT NULL DEFAULT 'real'
              CHECK (source IN ('real', 'synthetic')),
          created_at TIMESTAMPTZ DEFAULT NOW()
      );
      CREATE INDEX IF NOT EXISTS idx_messages_text_fts
          ON messages USING GIN (to_tsvector('english', text));
      CREATE TABLE IF NOT EXISTS flags (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          message_id UUID NOT NULL REFERENCES messages(id),
          flagged_by UUID REFERENCES users(id),
          reason TEXT,
          is_verified BOOLEAN DEFAULT FALSE,
          source VARCHAR(32) NOT NULL DEFAULT 'real'
              CHECK (source IN ('real', 'synthetic')),
          created_at TIMESTAMPTZ DEFAULT NOW()
      );
      CREATE TABLE IF NOT EXISTS moderation (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          message_id UUID NOT NULL REFERENCES messages(id),
          action VARCHAR(50) NOT NULL,
          confidence FLOAT,
          model_version VARCHAR(100),
          source VARCHAR(32) NOT NULL DEFAULT 'real'
              CHECK (source IN ('real', 'synthetic')),
          decided_at TIMESTAMPTZ DEFAULT NOW()
      );
    EOSQL
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: zulip
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: zulip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate  # ensure only one pod writes to the PVC at a time
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: zulip/zulip-postgresql:14
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: dbname
            - name: MLFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-db-credentials
                  key: MLFLOW_POSTGRES_PASSWORD
            - name: CHATSENTRY_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatsentry-db-credentials
                  key: CHATSENTRY_POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/create_mlflow_db.sh
              subPath: create_mlflow_db.sh
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/create_chatsentry_db.sh
              subPath: create_chatsentry_db.sh
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "zulip"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zulip
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
