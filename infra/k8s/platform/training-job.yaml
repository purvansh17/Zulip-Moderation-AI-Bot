# ── Training Job ──────────────────────────────────────────────────────────────
# Runs the ML training pipeline as a one-shot Kubernetes Job on the GPU node.
#
# Uses nsenter to enter the host's PID/mount/network/IPC namespaces and run
# retrain_latest.sh directly via Docker — this is the only reliable way to give
# the container AMD ROCm GPU access (Docker's --device passthrough works;
# K8s/containerd device plugins do not for AMD MI100 on this stack).
#
# Flow (mirrors scripts/retrain_latest.sh):
#   1. nsenter into host namespace (PID 1)
#   2. execute retrain_latest.sh on the host as cc user
#      - downloads latest versioned dataset from Chameleon S3 via rclone
#      - fetches approved checkpoint (if exists) for resume training
#      - runs docker run with --device=/dev/kfd --device=/dev/dri
#      - if quality gate passes, promotes best_model.pt back to S3
#
# Prerequisites (set up by Ansible post_k8s.yml automatically):
#   - retrain_latest.sh synced to /home/cc/Zulip-Moderation-AI-Bot/scripts/
#   - rclone configured at /home/cc/.config/rclone/rclone.conf
#   - trainer image available on Docker Hub: kichanitish/zulip-moderation-trainer:latest
#
# To trigger a training run:
#   kubectl apply -f training-job.yaml
#
# To re-run (Jobs are immutable after completion):
#   kubectl delete job zulip-moderation-training -n platform
#   kubectl apply -f training-job.yaml
#
# To monitor:
#   kubectl logs -n platform -l job-name=zulip-moderation-training -f
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: batch/v1
kind: Job
metadata:
  name: zulip-moderation-training
  namespace: platform
  labels:
    app: zulip-moderation-trainer
spec:
  # Do not restart on failure — fix the issue and re-apply
  backoffLimit: 0
  # Clean up completed/failed job pods after 1 hour
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: zulip-moderation-trainer
    spec:
      restartPolicy: Never
      hostPID: true
      hostNetwork: true
      hostIPC: true
      dnsPolicy: Default

      # Pin to GPU node — which carries the dedicated=gpu:NoSchedule taint.
      nodeSelector:
        dedicated: gpu
      tolerations:
        - key: dedicated
          value: gpu
          effect: NoSchedule

      containers:
        - name: trainer
          image: alpine:3
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true

          # nsenter into the host's full namespace (PID 1), then run
          # retrain_latest.sh as cc user via su. Docker inside will have
          # full access to /dev/kfd and /dev/dri with the correct groups.
          command:
            - nsenter
            - "--target"
            - "1"
            - "--mount"
            - "--uts"
            - "--ipc"
            - "--net"
            - "--pid"
            - "--"
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              RUN_NAME="${RUN_NAME:-hatebert_multihead}"
              MLFLOW_TRACKING_URI="${MLFLOW_TRACKING_URI:-http://mlflow.129.114.26.93.nip.io/}"
              export MLFLOW_TRACKING_URI
              exec su - cc -c "
                export MLFLOW_TRACKING_URI='$MLFLOW_TRACKING_URI'
                /home/cc/Zulip-Moderation-AI-Bot/scripts/retrain_latest.sh '$RUN_NAME'
              "

          env:
            - name: RUN_NAME
              value: "hatebert_multihead"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.129.114.26.93.nip.io/"

          resources:
            requests:
              cpu: 100m
              memory: 64Mi
