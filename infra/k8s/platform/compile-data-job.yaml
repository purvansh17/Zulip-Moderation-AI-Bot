# ── Data Compilation Job ───────────────────────────────────────────────────────
# One-shot Kubernetes Job that compiles a versioned training dataset from
# PostgreSQL (incremental mode) or Chameleon S3 CSV chunks (initial mode).
#
# Output: versioned splits uploaded to Chameleon S3 at:
#   s3://proj09_Data/zulip-training-data/v<YYYYMMDD-HHMMSS>/{train,val,test}.csv
#
# The training job (training-job.yaml) picks these up automatically on next run.
#
# Build:
#   docker buildx build --platform linux/amd64 -f Dockerfile.data \
#     -t kichanitish/chatsentry-data:latest --push .
#
# To trigger:
#   kubectl apply -f compile-data-job.yaml
#
# To re-run:
#   kubectl delete job compile-training-data -n platform
#   kubectl apply -f compile-data-job.yaml
#
# To monitor:
#   kubectl logs -n platform -l job-name=compile-training-data -f
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: compile-training-data
  namespace: platform
  labels:
    app: chatsentry-data
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: chatsentry-data
    spec:
      restartPolicy: Never

      containers:
        - name: compile
          image: kichanitish/chatsentry-data:latest
          imagePullPolicy: Always

          # Default CMD runs compile_training_data.py which auto-detects
          # initial vs incremental mode based on PostgreSQL content.

          env:
            # PostgreSQL — chatsentry database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: DATABASE_URL

            # Chameleon S3 (MinIO SDK compatible)
            - name: S3_ENDPOINT
              value: "chi.tacc.chameleoncloud.org:7480"
            - name: S3_SECURE
              value: "true"
            - name: MINIO_ENDPOINT
              value: "chi.tacc.chameleoncloud.org:7480"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_SECRET_KEY
            - name: MINIO_SECURE
              value: "true"

            # GPU service URL — used by synthetic_generator.py if invoked
            - name: GPU_SERVICE_URL
              value: "http://gpu-service.platform.svc.cluster.local:8001"
            - name: GPU_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gpu-service-credentials
                  key: GPU_SERVICE_API_KEY

          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
