# ── GPU Service (Qwen2.5-1.5B synthetic data generator) ───────────────────────
# Runs on the GPU node. Called by the data pipeline to generate synthetic
# training data (toxic / suicide / benign messages).
#
# Internal service only — not exposed via ingress.
# Called by compile_training_data.py at: http://gpu-service.platform.svc.cluster.local:8001
#
# Build:
#   docker buildx build --platform linux/amd64 -f Dockerfile.gpu-service \
#     -t kichanitish/gpu-service:latest --push .
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-service
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-service
  template:
    metadata:
      labels:
        app: gpu-service
    spec:
      # Pin to AMD GPU node
      nodeSelector:
        dedicated: gpu
      tolerations:
        - key: dedicated
          value: gpu
          effect: NoSchedule
      # Use host network so external DNS (chi.tacc.chameleoncloud.org) resolves
      # CoreDNS at 10.43.0.10 is not reachable from the GPU bare-metal node
      hostNetwork: true
      dnsPolicy: Default

      containers:
        - name: gpu-service
          image: kichanitish/gpu-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001

          env:
            # API key auth — set GPU_SERVICE_API_KEY="" to disable auth
            - name: GPU_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gpu-service-credentials
                  key: GPU_SERVICE_API_KEY

            # Chameleon S3 — used to stage Qwen model artifact (falls back to HF Hub)
            - name: S3_ENDPOINT
              value: "chi.tacc.chameleoncloud.org:7480"
            - name: S3_SECURE
              value: "true"
            - name: MINIO_ENDPOINT
              value: "chi.tacc.chameleoncloud.org:7480"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_SECRET_KEY
            - name: MINIO_SECURE
              value: "true"

            # Local staging dir for downloaded Qwen model weights
            - name: GPU_MODEL_STAGE_DIR
              value: "/tmp/qwen-model-stage"

            # AMD GPU visibility
            - name: HIP_VISIBLE_DEVICES
              value: "all"

          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            # Qwen2.5-1.5B download from HF Hub takes 2-5 min on first start
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 20

          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 300
            periodSeconds: 30

          resources:
            requests:
              cpu: 2000m
              memory: 8Gi
              amd.com/gpu: "1"
            limits:
              cpu: 4000m
              memory: 16Gi
              amd.com/gpu: "1"

          volumeMounts:
            - name: model-cache
              mountPath: /tmp/qwen-model-stage

      volumes:
        # Ephemeral model cache — re-downloaded on pod restart
        # To persist across restarts, change to a PVC backed by local-path
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-service
  namespace: platform
spec:
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: gpu-service
  namespace: platform
subsets:
  - addresses:
      - ip: "129.114.108.168"
    ports:
      - port: 8001
