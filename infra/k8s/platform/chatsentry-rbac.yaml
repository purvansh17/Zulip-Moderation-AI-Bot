apiVersion: v1
kind: ServiceAccount
metadata:
  name: chatsentry
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chatsentry-job-manager
  namespace: platform
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "create", "delete", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chatsentry-job-manager
  namespace: platform
subjects:
  - kind: ServiceAccount
    name: chatsentry
    namespace: platform
roleRef:
  kind: Role
  name: chatsentry-job-manager
  apiGroup: rbac.authorization.k8s.io
