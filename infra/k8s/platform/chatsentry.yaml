apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatsentry
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatsentry
  template:
    metadata:
      labels:
        app: chatsentry
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres.zulip.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
      serviceAccountName: chatsentry
      containers:
        - name: chatsentry
          image: kichanitish/chatsentry-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: DATABASE_URL
            # S3_ENDPOINT is used by minio_client.py (CHI@TACC Swift)
            - name: S3_ENDPOINT
              value: "chi.tacc.chameleoncloud.org:7480"
            - name: S3_SECURE
              value: "true"
            - name: GPU_SERVICE_URL
              value: "http://gpu-service.platform.svc.cluster.local:8001"
            - name: GPU_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gpu-service-credentials
                  key: GPU_SERVICE_API_KEY
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_SECRET_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chatsentry
  namespace: platform
spec:
  selector:
    app: chatsentry
  ports:
    - port: 8000
      targetPort: 8000
