# Ingress rules for all services using nip.io wildcard DNS.
# nip.io resolves <anything>.<IP>.nip.io → <IP>, so no DNS setup is needed.
#
# Access URLs (replace FLOATING_IP with your actual IP):
#   Zulip:  http://zulip.FLOATING_IP.nip.io
#   MLflow: http://mlflow.FLOATING_IP.nip.io
#
# The nginx-ingress controller is exposed via NodePort 30080 (HTTP).
# Chameleon security group opens port 80 which maps to NodePort 30080.

# ── Zulip (namespace: zulip) ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zulip-ingress
  namespace: zulip
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # Zulip uses websockets for real-time updates
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "zulip"
spec:
  ingressClassName: nginx
  rules:
    - host: "zulip.FLOATING_IP_PLACEHOLDER.nip.io"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zulip
                port:
                  number: 80
---
# ── MLflow (namespace: platform) ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlflow-ingress
  namespace: platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: "mlflow.FLOATING_IP_PLACEHOLDER.nip.io"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
