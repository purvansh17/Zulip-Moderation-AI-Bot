apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres.zulip.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z minio.platform.svc.cluster.local 9000; do
                echo "Waiting for minio..."; sleep 3
              done
        # Creates the mlflow-artifacts bucket if it does not already exist
        - name: create-bucket
          image: minio/mc:RELEASE.2025-01-17T23-25-50Z
          command:
            - sh
            - -c
            - |
              mc alias set myminio http://minio.platform.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing myminio/mlflow-artifacts
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.1.0
          command:
            - /bin/sh
            - -c
            - |
              pip install psycopg2-binary boto3 --quiet && \
              mlflow server \
                --backend-store-uri postgresql://mlflow_user:${MLFLOW_POSTGRES_PASSWORD}@postgres.zulip.svc.cluster.local:5432/mlflow \
                --artifacts-destination s3://mlflow-artifacts \
                --serve-artifacts \
                --host 0.0.0.0 \
                --port 5000
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-credentials
                  key: MLFLOW_POSTGRES_PASSWORD
            # MinIO S3-compatible credentials
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.platform.svc.cluster.local:9000"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: platform
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
