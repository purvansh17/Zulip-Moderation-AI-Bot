---
# install_k3s.yml — Installs k3s, NVIDIA support, and nginx-ingress
#
# Usage:
#   ansible-playbook -i inventory.yml install_k3s.yml --vault-password-file ~/.vault_pass

- name: Install k3s and configure Kubernetes
  hosts: all
  become: true
  gather_facts: true

  tasks:

    # ── k3s ─────────────────────────────────────────────────────────────────

    - name: Download and install k3s
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          INSTALL_K3S_EXEC="server --disable traefik --disable servicelb --write-kubeconfig-mode 644" \
          sh -
      args:
        creates: /usr/local/bin/k3s  # idempotent: skip if already installed

    - name: Wait for k3s API server to be ready
      ansible.builtin.wait_for:
        port: 6443
        host: 127.0.0.1
        timeout: 120

    - name: Wait for node to be Ready
      ansible.builtin.shell: k3s kubectl get nodes | grep -w Ready
      register: node_ready
      retries: 20
      delay: 10
      until: node_ready.rc == 0
      changed_when: false

    # ── kubeconfig for cc user ───────────────────────────────────────────────

    - name: Create .kube directory for cc user
      ansible.builtin.file:
        path: /home/cc/.kube
        state: directory
        owner: cc
        group: cc
        mode: "0700"

    - name: Copy k3s kubeconfig to cc user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/cc/.kube/config
        remote_src: true
        owner: cc
        group: cc
        mode: "0600"

    - name: Set KUBECONFIG in cc bashrc
      ansible.builtin.lineinfile:
        path: /home/cc/.bashrc
        line: 'export KUBECONFIG=/home/cc/.kube/config'
        create: true

    # ── Redirect local-path provisioner to dedicated directory ──────────────

    - name: Patch local-path-config to use /opt/local-path-provisioner
      ansible.builtin.shell: |
        kubectl patch configmap local-path-config -n kube-system --type merge \
          -p '{"data":{"config.json":"{\"nodePathMap\":[{\"node\":\"DEFAULT_PATH_FOR_NON_LISTED_NODES\",\"paths\":[\"{{ local_path_data_dir }}\"]}]}"}}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    # ── NVIDIA Kubernetes Configuration ──────────────────────────────────────
    # Host tools were installed in pre_k8s.yml, so K3s natively configured containerd.

    - name: Create NVIDIA RuntimeClass
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: node.k8s.io/v1
        kind: RuntimeClass
        metadata:
          name: nvidia
        handler: nvidia
        EOF
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Apply NVIDIA k8s-device-plugin DaemonSet
      ansible.builtin.shell: |
        kubectl apply -f \
          https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/{{ nvidia_device_plugin_version | default('v0.14.5') }}/deployments/static/nvidia-device-plugin.yml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Patch NVIDIA device plugin to use nvidia RuntimeClass
      ansible.builtin.shell: |
        kubectl patch daemonset nvidia-device-plugin-daemonset -n kube-system \
          -p '{"spec": {"template": {"spec": {"runtimeClassName": "nvidia"}}}}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    # ── nginx-ingress controller ─────────────────────────────────────────────

    - name: Deploy nginx-ingress controller
      ansible.builtin.shell: |
        kubectl apply -f \
          https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-{{ nginx_ingress_version }}/deploy/static/provider/cloud/deploy.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Wait for nginx-ingress controller pod to be Running
      ansible.builtin.shell: |
        kubectl wait --namespace ingress-nginx \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=180s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: ingress_wait
      retries: 3
      delay: 10
      until: ingress_wait.rc == 0
      changed_when: false

    # On Chameleon bare-metal there is no cloud load balancer.
    # hostNetwork: true binds nginx directly on the node's port 80/443.
    - name: Patch nginx-ingress to use hostNetwork (bare-metal Chameleon)
      ansible.builtin.shell: |
        kubectl patch deployment ingress-nginx-controller -n ingress-nginx \
          --type=json \
          -p='[{"op":"add","path":"/spec/template/spec/hostNetwork","value":true}]'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Wait for nginx-ingress to be ready after hostNetwork patch
      ansible.builtin.shell: |
        kubectl rollout status deployment/ingress-nginx-controller \
          -n ingress-nginx --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    # ── Summary ──────────────────────────────────────────────────────────────

    - name: Show cluster status
      ansible.builtin.shell: kubectl get nodes -o wide && kubectl get pods -A
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: cluster_status
      changed_when: false

    - name: Print cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_status.stdout_lines }}"