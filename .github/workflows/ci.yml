name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint with ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Check formatting with ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check
