<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}ChatSentry Dashboard{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #4CAF50; color: white; }
        tr:hover { background: #f5f5f5; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #45a049; }
        .checkbox-cell { text-align: center; }
        .pagination { margin: 20px 0; text-align: center; }
        .pagination a { padding: 8px 16px; margin: 0 5px; text-decoration: none; color: #4CAF50; }
        .pagination a:hover { background: #e8f5e9; border-radius: 4px; }
        .message-text { max-width: 600px; word-wrap: break-word; white-space: normal; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
